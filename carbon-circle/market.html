<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { font-family: 'Noto Sans SC', sans-serif; }
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --accent: #6c5ce7;
            --accent-light: #a29bfe;
            --text-primary: #ffffff;
            --text-secondary: #8b8b9a;
            --border: #2a2a3a;
        }
        body { background: var(--bg-primary); color: var(--text-primary); }
        .glass { background: rgba(26,26,36,0.85); backdrop-filter: blur(12px); }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; }
        .gradient-text { background: linear-gradient(135deg, #6c5ce7, #a29bfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-primary { background: linear-gradient(135deg, #6c5ce7, #a29bfe); transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(108,92,231,0.4); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .slide-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item.active { color: var(--accent); }
        .nav-item.active::after { content: ''; position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%); width: 20px; height: 3px; background: var(--accent); border-radius: 2px; }
        .product-card { transition: all 0.3s; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(108,92,231,0.15); }
        .modal-overlay { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
        .tag { padding: 2px 8px; border-radius: 8px; font-size: 11px; }
        .play-btn { width: 40px; height: 40px; background: linear-gradient(135deg, #6c5ce7, #a29bfe); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .price-tag { background: linear-gradient(135deg, #f59e0b, #f97316); }
        .tab-active { border-bottom: 2px solid var(--accent); color: var(--accent); }
        .waveform { display: flex; align-items: center; gap: 2px; height: 20px; }
        .waveform span { width: 3px; background: linear-gradient(to top, #6c5ce7, #a29bfe); border-radius: 2px; animation: wave 1s ease-in-out infinite; }
        .waveform span:nth-child(1) { animation-delay: 0s; height: 40%; }
        .waveform span:nth-child(2) { animation-delay: 0.1s; height: 70%; }
        .waveform span:nth-child(3) { animation-delay: 0.2s; height: 50%; }
        .waveform span:nth-child(4) { animation-delay: 0.3s; height: 80%; }
        .waveform span:nth-child(5) { animation-delay: 0.4s; height: 60%; }
        @keyframes wave { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.5); } }
        .badge-new { background: linear-gradient(135deg, #10b981, #34d399); }
        .badge-hot { background: linear-gradient(135deg, #ef4444, #f97316); }
        .badge-exclusive { background: linear-gradient(135deg, #8b5cf6, #a78bfa); }
    </style>
</head>
<body class="min-h-screen pb-20">
    <!-- 顶部导航 -->

    <!-- 主要内容 -->

                <div class="flex -space-x-2">

            <button class="market-tab px-4 py-2 rounded-full text-sm whitespace-nowrap bg-white/5 text-gray-400 border border-transparent" data-category="prompt">

            <button class="market-tab px-4 py-2 rounded-full text-sm whitespace-nowrap bg-white/5 text-gray-400 border border-transparent" data-category="template">

            <button class="market-tab px-4 py-2 rounded-full text-sm whitespace-nowrap bg-white/5 text-gray-400 border border-transparent" data-category="course">

        <!-- 排序 -->

            <div class="flex items-center gap-2">
                <button class="sort-btn active px-3 py-1.5 rounded-lg text-xs bg-purple-500/20 text-purple-400" data-sort="hot">
                    热门

    </main>

    </nav>

    <!-- 商品详情弹窗 -->

        <div class="absolute inset-0 bg-[#0a0a0f] overflow-y-auto">
            <div id="productDetail">
                <!-- 动态内容 -->
            </div>
        </div>
    </div>

    <!-- 播放器悬浮条 -->

                likes: 789,

                category: '音乐'
            },
            {

                title: '说唱Beat合集',
                cover: 'https://picsum.photos/400/400?random=106',
                author: { name: '节奏工厂', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Music6' },

                plays: 2345,
                description: '25个高品质说唱Beat，多种风格可选，可商用。',
                category: '音乐'
            }
        ];

        let currentProduct = null;
        let isPlaying = false;

        // 初始化
        function init() {
            renderProducts();
            setupEventListeners();
        }

        // 渲染商品列表
        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map((product, index) => `
                <div class="card product-card overflow-hidden slide-up cursor-pointer" style="animation-delay: ${index * 0.1}s" onclick="showProductDetail('${product.id}')">
                    <div class="aspect-square relative bg-gradient-to-br from-purple-500/20 to-pink-500/20">
                        <img src="${product.cover}" class="w-full h-full object-cover">
                        ${product.badge ? `
                            <span class="absolute top-2 left-2 px-2 py-0.5 rounded text-xs font-bold text-white badge-${product.badge}">
                                ${product.badge === 'hot' ? '🔥热门' : product.badge === 'new' ? '✨新品' : '💎独家'}
                            </span>
                        ` : ''}
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity bg-black/40">
                            <button class="play-btn" onclick="event.stopPropagation(); quickPlay('${product.id}')">
                                <i class="fas fa-play text-white"></i>
                            </button>
                        </div>
                        <div class="absolute bottom-2 right-2">
                            <div class="waveform">
                                <span></span><span></span><span></span><span></span><span></span>
                            </div>
                        </div>
                    </div>
                    <div class="p-3">
                        <h3 class="font-medium text-sm mb-1 truncate">${product.title}</h3>
                        <div class="flex items-center gap-2 mb-2">
                            <img src="${product.author.avatar}" class="w-5 h-5 rounded-full">
                            <span class="text-xs text-gray-500 truncate">${product.author.name}</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-1">
                                <span class="text-sm font-bold text-orange-400">¥${product.price}</span>
                                <span class="text-xs text-gray-500 line-through">¥${product.originalPrice}</span>
                            </div>
                            <span class="text-xs text-gray-500"><i class="fas fa-fire mr-1 text-orange-400"></i>${product.sales}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 事件监听
        function setupEventListeners() {
            // 分类切换
            document.querySelectorAll('.market-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.market-tab').forEach(t => {
                        t.classList.remove('active', 'bg-purple-500/20', 'text-purple-400', 'border-purple-500/30');
                        t.classList.add('bg-white/5', 'text-gray-400', 'border-transparent');
                    });
                    this.classList.add('active', 'bg-purple-500/20', 'text-purple-400', 'border-purple-500/30');
                    this.classList.remove('bg-white/5', 'text-gray-400', 'border-transparent');
                });
            });

            // 排序切换
            document.querySelectorAll('.sort-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.sort-btn').forEach(b => {
                        b.classList.remove('active', 'bg-purple-500/20', 'text-purple-400');
                        b.classList.add('bg-white/5', 'text-gray-400');
                    });
                    this.classList.add('active', 'bg-purple-500/20', 'text-purple-400');
                    this.classList.remove('bg-white/5', 'text-gray-400');
                });
            });

            // 视图切换
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.view-btn').forEach(b => {
                        b.classList.remove('active', 'bg-purple-500/20', 'text-purple-400');
                        b.classList.add('bg-white/5', 'text-gray-400');
                    });
                    this.classList.add('active', 'bg-purple-500/20', 'text-purple-400');
                    this.classList.remove('bg-white/5', 'text-gray-400');
                });
            });
        }

        // 显示商品详情
        function showProductDetail(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            currentProduct = product;
            
            const container = document.getElementById('productDetail');
            container.innerHTML = `
                <!-- 背景 -->
                <div class="relative">
                    <div class="h-72 bg-gradient-to-br from-purple-600 to-pink-600">
                        <img src="${product.cover}" class="w-full h-full object-cover opacity-50">
                    </div>
                    <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0f] to-transparent"></div>
                    
                    <!-- 返回按钮 -->
                    <button onclick="hideProductModal()" class="absolute top-4 left-4 w-10 h-10 rounded-full bg-black/30 flex items-center justify-center">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    
                    <!-- 操作按钮 -->
                    <div class="absolute top-4 right-4 flex gap-2">
                        <button class="w-10 h-10 rounded-full bg-black/30 flex items-center justify-center">
                            <i class="fas fa-share-alt"></i>
                        </button>
                        <button class="w-10 h-10 rounded-full bg-black/30 flex items-center justify-center">
                            <i class="far fa-heart"></i>
                        </button>
                    </div>
                    
                    <!-- 封面 -->
                    <div class="absolute left-1/2 -translate-x-1/2 -bottom-20">
                        <img src="${product.cover}" class="w-36 h-36 rounded-2xl object-cover shadow-2xl border-2 border-white/10">
                    </div>
                </div>
                
                <div class="pt-24 px-4 pb-6 text-center">
                    <h2 class="text-xl font-bold mb-2">${product.title}</h2>
                    <div class="flex items-center justify-center gap-3 mb-4">
                        <img src="${product.author.avatar}" class="w-8 h-8 rounded-full">
                        <span class="text-sm text-gray-400">${product.author.name}</span>
                    </div>
                    <div class="flex items-center justify-center gap-2 mb-6">
                        ${product.tags.map(tag => `<span class="tag bg-white/10 text-gray-400">${tag}</span>`).join('')}
                    </div>
                    
                    <div class="flex items-center justify-center gap-6 mb-6">
                        <div class="text-center">
                            <div class="font-bold text-lg">${product.sales}</div>
                            <div class="text-xs text-gray-500">销量</div>
                        </div>
                        <div class="text-center">
                            <div class="font-bold text-lg">${product.likes}</div>
                            <div class="text-xs text-gray-500">收藏</div>
                        </div>
                        <div class="text-center">
                            <div class="font-bold text-lg">${product.plays}</div>
                            <div class="text-xs text-gray-500">播放</div>
                        </div>
                    </div>
                    
                    <!-- 预览播放 -->
                    <div class="card p-4 mb-6">
                        <div class="flex items-center gap-4">
                            <button class="play-btn w-14 h-14" onclick="quickPlay('${product.id}')">
                                <i class="fas fa-play text-white ml-1"></i>
                            </button>
                            <div class="flex-1">
                                <div class="text-sm font-medium mb-1">点击试听30秒预览</div>
                                <div class="h-1.5 bg-white/10 rounded-full overflow-hidden">
                                    <div class="h-full w-1/3 bg-gradient-to-r from-purple-500 to-pink-500 rounded-full"></div>
                                </div>
                            </div>
                            <span class="text-xs text-gray-500">${product.duration}</span>
                        </div>
                    </div>
                    
                    <!-- 价格 -->
                    <div class="flex items-center justify-center gap-3 mb-6">
                        <span class="text-3xl font-bold text-orange-400">¥${product.price}</span>
                        <span class="text-lg text-gray-500 line-through">¥${product.originalPrice}</span>
                        <span class="px-2 py-1 rounded bg-red-500/20 text-red-400 text-xs">限时5折</span>
                    </div>
                    
                    <div class="flex gap-3">
                        <button onclick="addToCart()" class="flex-1 py-4 rounded-xl border border-purple-500 text-purple-400 font-semibold">
                            <i class="fas fa-cart-plus mr-2"></i>加入购物车
                        </button>
                        <button onclick="buyNow()" class="flex-1 py-4 rounded-xl btn-primary text-white font-semibold">
                            立即购买
                        </button>
                    </div>
                    
                    <!-- 商品描述 -->
                    <div class="card p-4 mt-6 text-left">
                        <h3 class="font-semibold mb-3"><i class="fas fa-info-circle text-purple-400 mr-2"></i>商品说明</h3>
                        <p class="text-sm text-gray-400 leading-relaxed">${product.description}</p>
                        
                        <div class="mt-4 pt-4 border-t border-gray-800">
                            <h4 class="font-medium text-sm mb-2">包含内容</h4>
                            <ul class="text-sm text-gray-400 space-y-1">
                                <li><i class="fas fa-check text-green-400 mr-2"></i>完整版音乐文件 (WAV/MP3)</li>
                                <li><i class="fas fa-check text-green-400 mr-2"></i>分轨文件 (干声/伴奏)</li>
                                <li><i class="fas fa-check text-green-400 mr-2"></i>商用授权许可</li>
                            </ul>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('productModal').classList.remove('hidden');
        }

        function hideProductModal() {
            document.getElementById('productModal').classList.add('hidden');
        }

        // 快速播放
        function quickPlay(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            document.getElementById('playerCover').src = product.cover;
            document.getElementById('playerTitle').textContent = product.title;
            document.getElementById('playerAuthor').textContent = product.author.name;
            document.getElementById('playerBar').classList.remove('hidden');
            isPlaying = true;
            updatePlayIcon();
        }

        function togglePlay() {
            isPlaying = !isPlaying;
            updatePlayIcon();
        }

        function updatePlayIcon() {
            document.getElementById('playIcon').className = isPlaying ? 'fas fa-pause text-white text-sm' : 'fas fa-play text-white text-sm';
        }

        function closePlayer() {
            document.getElementById('playerBar').classList.add('hidden');
            isPlaying = false;
        }

        function addToCart() {
            alert('已加入购物车！');
        }

        function buyNow() {
            alert('正在跳转支付...');
        }

        function loadMore() {
            alert('正在加载更多商品...');
        }

        // 启动
        init();
    </script>
</body>
</html>
