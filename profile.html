<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的主页 - 碳基圈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { font-family: 'Noto Sans SC', sans-serif; }
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --accent: #6c5ce7;
            --accent-light: #a29bfe;
            --text-primary: #ffffff;
            --text-secondary: #8b8b9a;
            --border: #2a2a3a;
        }
        body { background: var(--bg-primary); color: var(--text-primary); }
        .glass { background: rgba(26,26,36,0.85); backdrop-filter: blur(12px); }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; }
        .gradient-text { background: linear-gradient(135deg, #6c5ce7, #a29bfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-primary { background: linear-gradient(135deg, #6c5ce7, #a29bfe); transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(108,92,231,0.4); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .slide-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item.active { color: var(--accent); }
        .nav-item.active::after { content: ''; position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%); width: 20px; height: 3px; background: var(--accent); border-radius: 2px; }
        .avatar-ring { background: linear-gradient(135deg, #6c5ce7, #a29bfe); padding: 3px; }
        .tab-active { border-bottom: 2px solid var(--accent); color: var(--accent); }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
        .post-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .post-item { aspect-ratio: 1; position: relative; overflow: hidden; }
        .post-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
        .post-item:hover img { transform: scale(1.05); }
        .level-badge { background: linear-gradient(135deg, #f59e0b, #f97316); }
        .vip-badge { background: linear-gradient(135deg, #8b5cf6, #a78bfa); }
        .modal-overlay { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
        .toggle-switch { width: 44px; height: 24px; background: #374151; border-radius: 12px; position: relative; transition: background 0.3s; }
        .toggle-switch.active { background: #6c5ce7; }
        .toggle-switch::after { content: ''; position: absolute; width: 20px; height: 20px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: transform 0.3s; }
        .toggle-switch.active::after { transform: translateX(20px); }
        .menu-item { padding: 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
        .menu-item:last-child { border-bottom: none; }
    </style>
</head>
<body class="min-h-screen pb-20">

                        </div>

                <div class="card mt-4">

                        </div>

                <button onclick="logout()" class="w-full mt-6 py-4 rounded-xl bg-red-500/10 text-red-400 font-semibold">

    <!-- 编辑资料弹窗 -->

        <div class="absolute inset-0 bg-[#0a0a0f] overflow-y-auto">

    <script>
        // 用户数据
        let currentUser = null;

        const users = [
            { id: 'u1', name: 'AI小探', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Ai', bio: '探索AI的无限可能 🤖 | 每天分享AI干货', followers: 1234, following: 567, likes: 8901, level: 5, isVip: true },
            { id: 'u2', name: '音乐精灵', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Music', bio: '用音符编织梦想 🎵', followers: 2345, following: 123, likes: 15678, level: 7, isVip: true },
            { id: 'u3', name: '画师小梦', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Art', bio: '每一笔都是艺术 🎨', followers: 5678, following: 234, likes: 23456, level: 8, isVip: false },
            { id: 'u4', name: '科技小王', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Tech', bio: '科技改变生活 🚀', followers: 890, following: 456, likes: 5678, level: 4, isVip: false },
            { id: 'u5', name: '创意达人', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Create', bio: '创意无限 💡', followers: 3456, following: 789, likes: 12345, level: 6, isVip: true }
        ];

        const myPosts = [
            { id: 'p1', image: 'https://picsum.photos/300/300?random=201', likes: 234 },
            { id: 'p2', image: 'https://picsum.photos/300/300?random=202', likes: 567 },
            { id: 'p3', image: 'https://picsum.photos/300/300?random=203', likes: 890 },
            { id: 'p4', image: 'https://picsum.photos/300/300?random=204', likes: 123 },
            { id: 'p5', image: 'https://picsum.photos/300/300?random=205', likes: 456 },
            { id: 'p6', image: 'https://picsum.photos/300/300?random=206', likes: 789 }
        ];

        const myFavorites = [
            { id: 'f1', image: 'https://picsum.photos/300/300?random=301', likes: 1234 },
            { id: 'f2', image: 'https://picsum.photos/300/300?random=302', likes: 567 },
            { id: 'f3', image: 'https://picsum.photos/300/300?random=303', likes: 890 }
        ];

        const myWorks = [
            { id: 'w1', title: 'AI生成封面合集', cover: 'https://picsum.photos/400/300?random=401', count: 24 },
            { id: 'w2', title: '原创音乐作品', cover: 'https://picsum.photos/400/300?random=402', count: 12 },
            { id: 'w3', title: 'AI绘画作品', cover: 'https://picsum.photos/400/300?random=403', count: 48 },
            { id: 'w4', title: '视频创作集', cover: 'https://picsum.photos/400/300?random=404', count: 8 }
        ];

        // 初始化
        function init() {
            // 从URL或localStorage获取用户
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('user');
            
            if (userId) {
                currentUser = users.find(u => u.id === userId) || users[0];
            } else {
                currentUser = JSON.parse(localStorage.getItem('carbon_circle_user')) || users[0];
            }
            
            updateUserUI();
            renderPosts();
            renderFavorites();
            renderWorks();
            setupEventListeners();
        }

        // 更新用户界面
        function updateUserUI() {
            document.getElementById('userAvatar').src = currentUser.avatar;
            document.getElementById('userName').textContent = currentUser.name;
            document.getElementById('userBio').textContent = currentUser.bio;
            document.getElementById('followersCount').textContent = formatNumber(currentUser.followers);
            document.getElementById('followingCount').textContent = formatNumber(currentUser.following);
            document.getElementById('likesCount').textContent = formatNumber(currentUser.likes);
            document.getElementById('levelBadge').textContent = `Lv.${currentUser.level}`;
            document.getElementById('vipBadge').style.display = currentUser.isVip ? 'inline' : 'none';
            
            // 判断是否是当前用户
            const isMe = currentUser.id === JSON.parse(localStorage.getItem('carbon_circle_user') || '{}')?.id;
            if (!isMe) {
                document.getElementById('pageTitle').textContent = currentUser.name;
            }
        }

        // 格式化数字
        function formatNumber(num) {
            if (num >= 10000) return (num / 10000).toFixed(1) + 'w';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
            return num.toString();
        }

        // 渲染动态
        function renderPosts() {
            const grid = document.getElementById('postGrid');
            if (myPosts.length === 0) {
                grid.classList.add('hidden');
                document.getElementById('emptyPosts').classList.remove('hidden');
                return;
            }
            
            grid.innerHTML = myPosts.map(post => `
                <div class="post-item">
                    <img src="${post.image}" class="cursor-pointer">
                    <div class="absolute inset-0 bg-black/40 opacity-0 hover:opacity-100 transition-opacity flex items-center justify-center">
                        <span class="text-white text-sm"><i class="fas fa-heart mr-1"></i>${post.likes}</span>
                    </div>
                </div>
            `).join('');
        }

        // 渲染收藏
        function renderFavorites() {
            const grid = document.getElementById('favoriteGrid');
            if (myFavorites.length === 0) {
                grid.classList.add('hidden');
                document.getElementById('emptyFavorites').classList.remove('hidden');
                return;
            }
            
            grid.innerHTML = myFavorites.map(post => `
                <div class="post-item">
                    <img src="${post.image}" class="cursor-pointer">
                    <div class="absolute inset-0 bg-black/40 opacity-0 hover:opacity-100 transition-opacity flex items-center justify-center">
                        <span class="text-white text-sm"><i class="fas fa-star mr-1"></i>${post.likes}</span>
                    </div>
                </div>
            `).join('');
        }

        // 渲染作品
        function renderWorks() {
            const grid = document.getElementById('worksGrid');
            if (myWorks.length === 0) {
                grid.classList.add('hidden');
                document.getElementById('emptyWorks').classList.remove('hidden');
                return;
            }
            
            grid.innerHTML = myWorks.map(work => `
                <div class="card overflow-hidden cursor-pointer" onclick="openWork('${work.id}')">
                    <img src="${work.cover}" class="w-full aspect-video object-cover">
                    <div class="p-3">
                        <h4 class="font-medium text-sm mb-1">${work.title}</h4>
                        <span class="text-xs text-gray-500">${work.count}个作品</span>
                    </div>
                </div>
            `).join('');
        }

        // 事件监听
        function setupEventListeners() {
            // Tab切换
            document.querySelectorAll('.profile-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.profile-tab').forEach(t => {
                        t.classList.remove('active', 'tab-active');
                        t.classList.add('text-gray-500');
                    });
                    this.classList.add('active', 'tab-active');
                    this.classList.remove('text-gray-500');
                    
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
                    document.getElementById(this.dataset.tab + 'Tab').classList.remove('hidden');
                });
            });

            // 性别选择
            document.querySelectorAll('.gender-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.gender-btn').forEach(b => {
                        b.classList.remove('border-purple-500', 'text-purple-400');
                        b.classList.add('border-gray-700', 'text-gray-400');
                    });
                    this.classList.add('border-purple-500', 'text-purple-400');
                    this.classList.remove('border-gray-700', 'text-gray-400');
                });
            });
        }

        // 设置
        function showSettings() {
            document.getElementById('settingsModal').classList.remove('hidden');
        }

        function hideSettings() {
            document.getElementById('settingsModal').classList.add('hidden');
        }

        // 编辑资料
        function editProfile() {
            document.getElementById('editAvatar').src = currentUser.avatar;
            document.getElementById('editName').value = currentUser.name;
            document.getElementById('editBio').value = currentUser.bio;
            document.getElementById('editModal').classList.remove('hidden');
        }

        function hideEditModal() {
            document.getElementById('editModal').classList.add('hidden');
        }

        function saveProfile() {
            currentUser.name = document.getElementById('editName').value;
            currentUser.bio = document.getElementById('editBio').value;
            localStorage.setItem('carbon_circle_user', JSON.stringify(currentUser));
            updateUserUI();
            hideEditModal();
            alert('保存成功！');
        }

        // 分享
        function shareProfile() {
            alert('分享链接已复制到剪贴板！');
        }

        // 查看粉丝/关注
        function showFollowers() {
            alert('粉丝列表开发中...');
        }

        function showFollowing() {
            alert('关注列表开发中...');
        }

        // 跳转发布
        function goToPost() {
            window.location.href = 'index.html';
        }

        // 打开作品
        function openWork(workId) {
            alert('作品详情开发中...');
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('carbon_circle_user');
            window.location.href = 'index.html';
        }

        // 启动
        init();
    </script>
</body>
</html>
