    <style>
        * { font-family: 'Noto Sans SC', sans-serif; }
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --accent: #6c5ce7;
            --accent-light: #a29bfe;
            --text-primary: #ffffff;
            --text-secondary: #8b8b9a;
            --border: #2a2a3a;
        }
        body { background: var(--bg-primary); color: var(--text-primary); }
        .glass { background: rgba(26,26,36,0.85); backdrop-filter: blur(12px); }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; }
        .gradient-text { background: linear-gradient(135deg, #6c5ce7, #a29bfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-primary { background: linear-gradient(135deg, #6c5ce7, #a29bfe); transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(108,92,231,0.4); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .slide-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item.active { color: var(--accent); }
        .nav-item.active::after { content: ''; position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%); width: 20px; height: 3px; background: var(--accent); border-radius: 2px; }
        .character-card { transition: all 0.3s; }
        .character-card:hover { transform: translateY(-4px); }
        .character-card:hover .avatar-ring { box-shadow: 0 0 30px rgba(108,92,231,0.5); }
        .avatar-ring { transition: all 0.3s; }
        .tag { padding: 2px 8px; border-radius: 8px; font-size: 11px; }
        .chat-bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; }
        .chat-left { background: var(--bg-card); border-bottom-left-radius: 4px; }
        .chat-right { background: linear-gradient(135deg, #6c5ce7, #a29bfe); border-bottom-right-radius: 4px; }
        .modal-overlay { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
        .typing-indicator span { width: 8px; height: 8px; background: #6c5ce7; border-radius: 50%; animation: typingBounce 1.4s infinite ease-in-out; }
        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .float-btn { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    </style>
</head>

        // 渲染角色列表
        function renderCharacters() {
            const grid = document.getElementById('characterGrid');
            grid.innerHTML = characters.map((char, index) => `
                <div class="card character-card overflow-hidden slide-up cursor-pointer" style="animation-delay: ${index * 0.1}s" onclick="showCharacterDetail('${char.id}')">
                    <div class="aspect-square relative bg-gradient-to-br from-purple-500/20 to-pink-500/20 flex items-center justify-center">
                        <img src="${char.avatar}" class="w-24 h-24 rounded-full object-cover avatar-ring">
                        <div class="absolute top-2 right-2">
                            <button class="w-8 h-8 rounded-full ${char.isLiked ? 'bg-pink-500' : 'bg-white/20'} flex items-center justify-center" onclick="event.stopPropagation(); toggleLike('${char.id}')">
                                <i class="${char.isLiked ? 'fas' : 'far'} fa-heart text-xs ${char.isLiked ? 'text-white' : 'text-white/80'}"></i>
                            </button>
                        </div>
                        <div class="absolute bottom-2 left-2 flex gap-1">
                            ${char.tags.slice(0, 2).map(tag => `<span class="px-2 py-0.5 rounded text-xs bg-white/20">${tag}</span>`).join('')}
                        </div>
                    </div>
                    <div class="p-3">
                        <h3 class="font-semibold mb-1">${char.name}</h3>
                        <p class="text-xs text-gray-400 mb-2 line-clamp-2">${char.description}</p>
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3 text-xs text-gray-500">
                                <span><i class="fas fa-comment mr-1"></i>${formatNumber(char.chats)}</span>
                                <span><i class="fas fa-users mr-1"></i>${formatNumber(char.followers)}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 格式化数字
        function formatNumber(num) {
            if (num >= 10000) return (num / 10000).toFixed(1) + 'w';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
            return num.toString();
        }

                        b.classList.remove('active', 'bg-purple-500/20', 'text-purple-400', 'border-purple-500/30');
                        b.classList.add('bg-white/5', 'text-gray-400', 'border-transparent');
                    });
                    this.classList.add('active', 'bg-purple-500/20', 'text-purple-400', 'border-purple-500/30');
                    this.classList.remove('bg-white/5', 'text-gray-400', 'border-transparent');
                    filterCharacters(this.dataset.category);
                });
            });

            // 排序切换
            document.querySelectorAll('.sort-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.sort-btn').forEach(b => {
                        b.classList.remove('active', 'bg-purple-500/20', 'text-purple-400');
                        b.classList.add('bg-white/5', 'text-gray-400');
                    });
                    this.classList.add('active', 'bg-purple-500/20', 'text-purple-400');
                    this.classList.remove('bg-white/5', 'text-gray-400');
                });
            });

            // 快捷回复
            document.querySelectorAll('.quick-reply').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.getElementById('chatInput').value = this.textContent;
                    sendMessage();
                });
            });

            // 回车发送
            document.getElementById('chatInput')?.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
        }

        // 筛选角色
        function filterCharacters(category) {
            const filtered = category === 'all' ? characters : characters.filter(c => c.category === category);
            const grid = document.getElementById('characterGrid');
            grid.innerHTML = filtered.map((char, index) => `
                <div class="card character-card overflow-hidden slide-up cursor-pointer" style="animation-delay: ${index * 0.1}s" onclick="showCharacterDetail('${char.id}')">
                    <div class="aspect-square relative bg-gradient-to-br from-purple-500/20 to-pink-500/20 flex items-center justify-center">
                        <img src="${char.avatar}" class="w-24 h-24 rounded-full object-cover avatar-ring">
                        <div class="absolute top-2 right-2">
                            <button class="w-8 h-8 rounded-full ${char.isLiked ? 'bg-pink-500' : 'bg-white/20'} flex items-center justify-center" onclick="event.stopPropagation(); toggleLike('${char.id}')">
                                <i class="${char.isLiked ? 'fas' : 'far'} fa-heart text-xs ${char.isLiked ? 'text-white' : 'text-white/80'}"></i>
                            </button>
                        </div>
                        <div class="absolute bottom-2 left-2 flex gap-1">
                            ${char.tags.slice(0, 2).map(tag => `<span class="px-2 py-0.5 rounded text-xs bg-white/20">${tag}</span>`).join('')}
                        </div>
                    </div>
                    <div class="p-3">
                        <h3 class="font-semibold mb-1">${char.name}</h3>
                        <p class="text-xs text-gray-400 mb-2 line-clamp-2">${char.description}</p>
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3 text-xs text-gray-500">
                                <span><i class="fas fa-comment mr-1"></i>${formatNumber(char.chats)}</span>
                                <span><i class="fas fa-users mr-1"></i>${formatNumber(char.followers)}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 点赞
        function toggleLike(charId) {
            const char = characters.find(c => c.id === charId);
            if (char) {
                char.isLiked = !char.isLiked;
                char.likes += char.isLiked ? 1 : -1;
                renderCharacters();
            }
        }

        // 显示角色详情
        function showCharacterDetail(charId) {
            const char = characters.find(c => c.id === charId);
            if (!char) return;
            
            currentCharacter = char;
            
            const modal = document.getElementById('characterModal');
            modal.querySelector('.absolute').innerHTML = `
                <div class="relative">
                    <!-- 背景 -->
                    <div class="h-64 bg-gradient-to-br from-purple-600 to-pink-600"></div>
                    
                    <!-- 返回按钮 -->
                    <button onclick="hideCharacterModal()" class="absolute top-4 left-4 w-10 h-10 rounded-full bg-black/30 flex items-center justify-center">
                        <i class="fas fa-arrow-left"></i>
                    </button>
                    
                    <!-- 操作按钮 -->
                    <button class="absolute top-4 right-4 w-10 h-10 rounded-full bg-black/30 flex items-center justify-center">
                        <i class="fas fa-share-alt"></i>
                    </button>
                    
                    <!-- 头像 -->
                    <div class="absolute -bottom-16 left-1/2 -translate-x-1/2">
                        <img src="${char.avatar}" class="w-32 h-32 rounded-full object-cover border-4 border-[#0a0a0f] avatar-ring">
                    </div>
                </div>
                
                <div class="pt-20 px-4 pb-6 text-center">
                    <h2 class="text-2xl font-bold mb-2">${char.name}</h2>
                    <div class="flex items-center justify-center gap-2 mb-4">
                        ${char.tags.map(tag => `<span class="tag bg-purple-500/20 text-purple-400">${tag}</span>`).join('')}
                    </div>
                    
                    <div class="flex items-center justify-center gap-6 mb-6">
                        <div class="text-center">
                            <div class="font-bold text-lg">${formatNumber(char.chats)}</div>
                            <div class="text-xs text-gray-500">对话数</div>
                        </div>
                        <div class="text-center">
                            <div class="font-bold text-lg">${formatNumber(char.followers)}</div>
                            <div class="text-xs text-gray-500">粉丝</div>
                        </div>
                        <div class="text-center">
                            <div class="font-bold text-lg">${formatNumber(char.likes)}</div>
                            <div class="text-xs text-gray-500">获赞</div>
                        </div>
                    </div>
                    
                    <button onclick="hideCharacterModal(); showChat('${char.id}')" class="w-full py-4 rounded-xl btn-primary text-white font-semibold mb-4">
                        <i class="fas fa-comment mr-2"></i>开始对话
                    </button>
                    
                    <div class="card p-4 text-left">
                        <h3 class="font-semibold mb-2"><i class="fas fa-user text-purple-400 mr-2"></i>角色简介</h3>
                        <p class="text-sm text-gray-400 mb-4">${char.description}</p>
                        
                        <h3 class="font-semibold mb-2"><i class="fas fa-star text-yellow-400 mr-2"></i>性格特点</h3>
                        <p class="text-sm text-gray-400 mb-4">${char.personality}</p>
                        
                        <h3 class="font-semibold mb-2"><i class="fas fa-magic text-pink-400 mr-2"></i>核心能力</h3>
                        <p class="text-sm text-gray-400">${char.ability}</p>
                    </div>
                </div>
            `;
            
            modal.classList.remove('hidden');
        }

        function hideCharacterModal() {
            document.getElementById('characterModal').classList.add('hidden');
        }

        // 聊天功能
        function showChat(charId) {
            const char = characters.find(c => c.id === charId);
            if (!char) return;
            
            currentCharacter = char;
            chatHistory = [
                { role: 'assistant', content: `你好呀！我是${char.name}，很高兴认识你！有什么我可以帮你的吗？` }
            ];
            
            document.getElementById('chatAvatar').src = char.avatar;
            document.getElementById('chatName').textContent = char.name;
            renderChatMessages();
            
            document.getElementById('chatModal').classList.remove('hidden');
        }

        function hideChatModal() {
            document.getElementById('chatModal').classList.add('hidden');
        }

        function renderChatMessages() {
            const container = document.getElementById('chatMessages');
            container.innerHTML = chatHistory.map(msg => `
                <div class="flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}">
                    ${msg.role === 'assistant' ? `<img src="${currentCharacter.avatar}" class="w-8 h-8 rounded-full object-cover mr-2">` : ''}
                    <div class="chat-bubble ${msg.role === 'user' ? 'chat-right' : 'chat-left'}">
                        <p class="text-sm">${msg.content}</p>
                    </div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            
            if (!text) return;
            
            // 添加用户消息
            chatHistory.push({ role: 'user', content: text });
            input.value = '';
            renderChatMessages();
            
            // 添加打字指示器
            const container = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'flex justify-start';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <img src="${currentCharacter.avatar}" class="w-8 h-8 rounded-full object-cover mr-2">
                <div class="chat-bubble chat-left">
                    <div class="typing-indicator flex gap-1 py-1">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            container.appendChild(typingDiv);
            container.scrollTop = container.scrollHeight;
            
            // 检查是否为AI角色，使用硅基流动 API
            if (currentCharacter.isAI && currentCharacter.aiType && API_CONFIG.checkSiliconFlowConfigured()) {
                callSiliconFlowAPI(text);
            } else {
                // 非AI角色或未配置API，使用模拟回复
                simulateResponse();
            }
        }
        
        // 调用硅基流动 API 进行聊天
        async function callSiliconFlowAPI(userMessage) {
            try {
                const charConfig = CHARACTER_PROMPTS[currentCharacter.aiType];
                const systemPrompt = charConfig ? charConfig.prompt : '你是一个有帮助的AI助手。';
                
                const response = await fetch(SILICONFLOW_API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${SILICONFLOW_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: SILICONFLOW_MODEL,
                        messages: [
                            { role: 'system', content: systemPrompt },
                            ...chatHistory.slice(-10).map(msg => ({
                                role: msg.role,
                                content: msg.content
                            })),
                            { role: 'user', content: userMessage }
                        ],
                        temperature: 0.8,
                        max_tokens: 1024
                    })
                });
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(`API错误: ${response.status} - ${errorData.error?.message || '未知错误'}`);
                }
                
                const data = await response.json();
                const aiResponse = data.choices?.[0]?.message?.content || '抱歉，我暂时无法回答这个问题。';
                
                // 移除打字指示器
                document.getElementById('typingIndicator')?.remove();
                
                // 添加AI回复
                chatHistory.push({ role: 'assistant', content: aiResponse });
                renderChatMessages();
                
            } catch (error) {
                console.error('硅基流动 API错误:', error);
                document.getElementById('typingIndicator')?.remove();
                
                // 显示错误提示
                const container = document.getElementById('chatMessages');
                const errorDiv = document.createElement('div');
                errorDiv.className = 'flex justify-center';
                errorDiv.innerHTML = `
                    <div class="chat-bubble bg-red-500/20 text-red-400 text-xs px-4 py-2">
                        <i class="fas fa-exclamation-circle mr-1"></i> AI回复失败: ${error.message}
                    </div>
                `;
                container.appendChild(errorDiv);
                container.scrollTop = container.scrollHeight;
                
                // 提供模拟回复作为备选
                setTimeout(() => {
                    errorDiv.remove();
                    chatHistory.push({ role: 'assistant', content: getFallbackResponse(userMessage) });
                    renderChatMessages();
                }, 2000);
            }
        }
        
        // 获取模拟回复（当API不可用时）
        function getFallbackResponse(message) {
            const responses = [
                `收到你的消息了！虽然我现在有点忙，但很高兴和你聊天~`,
                `这个问题很有趣！让我想想怎么回答你...`,
                `哇，你问的这个问题太好了！我需要整理一下思路~`,
                `谢谢你的提问！我会尽力给你最好的回答。`,
                `明白了！关于这个话题，我有一些想法想和你分享~`
            ];
            return responses[Math.floor(Math.random() * responses.length)];
        }
        
        // 模拟AI回复（非AI角色）
        function simulateResponse() {
            setTimeout(() => {
                document.getElementById('typingIndicator')?.remove();
                const responses = [
                    `这是个很好的问题！让我来帮你分析一下...`,
                    `明白了！关于这个话题，我有一些想法想和你分享~`,
                    `好的，我来帮你解答。根据我的理解...`,
                    `太棒了！很高兴和你讨论这个话题！`,
                    `让我想想...其实这个问题可以从多个角度来看待`
                ];
                chatHistory.push({ 
                    role: 'assistant', 
                    content: responses[Math.floor(Math.random() * responses.length)] 
                });
                renderChatMessages();
            }, 1500);
        }

        // 搜索
        function showCharacterSearch() {
            alert('角色搜索功能开发中...');
        }

        // 筛选
        function showFilters() {
            alert('筛选功能开发中...');
        }

        // 加载更多
        function loadMore() {
            alert('正在加载更多角色...');
        }

        // 创建角色
        function showCreateCharacter() {
            alert('创建角色功能开发中，敬请期待！');
        }

        // 启动
        init();
    </script>
</body>
</html>
