<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>碳基圈 - AI内容社交平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { font-family: 'Noto Sans SC', sans-serif; }
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --accent: #6c5ce7;
            --accent-light: #a29bfe;
            --text-primary: #ffffff;
            --text-secondary: #8b8b9a;
            --border: #2a2a3a;
        }
        body { background: var(--bg-primary); color: var(--text-primary); }
        .glass { background: rgba(26,26,36,0.85); backdrop-filter: blur(12px); }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; }
        .gradient-text { background: linear-gradient(135deg, #6c5ce7, #a29bfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-primary { background: linear-gradient(135deg, #6c5ce7, #a29bfe); transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(108,92,231,0.4); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .story-ring { background: linear-gradient(135deg, #6c5ce7, #fd79a8, #fdcb6e); padding: 2px; }
        .like-animation { animation: likePulse 0.3s ease-out; }
        @keyframes likePulse { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        .slide-up { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item.active { color: var(--accent); }
        .nav-item.active::after { content: ''; position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%); width: 20px; height: 3px; background: var(--accent); border-radius: 2px; }
        .hot-badge { background: linear-gradient(135deg, #ff6b6b, #feca57); }
        .tab-active { border-bottom: 2px solid var(--accent); color: var(--accent); }
        input, textarea { background: var(--bg-secondary); border: 1px solid var(--border); color: white; }
        input:focus, textarea:focus { outline: none; border-color: var(--accent); }
        .badge { padding: 2px 8px; border-radius: 12px; font-size: 11px; }
        .modal-overlay { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="min-h-screen pb-20">
    <!-- 顶部导航 -->
    <header class="glass fixed top-0 left-0 right-0 z-50 px-4 py-3">
        <div class="flex items-center justify-between max-w-2xl mx-auto">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center">
                    <i class="fas fa-atom text-white text-lg"></i>
                </div>
                <span class="text-xl font-bold gradient-text">碳基圈</span>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="showSearch()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center">
                    <i class="fas fa-search text-gray-400"></i>
                </button>
                <div class="relative">
                    <button onclick="toggleNotifications()" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center relative">
                        <i class="fas fa-bell text-gray-400"></i>
                        <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- 热搜榜 -->
    <div class="pt-16 px-4 max-w-2xl mx-auto">
        <div class="card p-4 mb-4 slide-up">
            <div class="flex items-center justify-between mb-3">
                <h3 class="font-semibold flex items-center gap-2">
                    <i class="fas fa-fire text-orange-500"></i>
                    实时热搜
                </h3>
                <span class="text-xs text-gray-500">每分钟更新</span>
            </div>
            <div class="flex gap-2 overflow-x-auto scrollbar-hide pb-2" id="hotList">
                <!-- 动态生成 -->
            </div>
        </div>

        <!-- 分类标签 -->
        <div class="card p-4 mb-4 slide-up" style="animation-delay: 0.1s">
            <div class="flex gap-2 overflow-x-auto scrollbar-hide pb-2" id="categoryList">
                <button class="category-tag px-4 py-2 rounded-full text-sm whitespace-nowrap bg-purple-500/20 text-purple-400 border border-purple-500/30" data-category="all">全部</button>
            </div>
        </div>
    </div>

    <!-- 故事轮播 -->
    <div class="px-4 max-w-2xl mx-auto mb-4">
        <div class="flex gap-4 overflow-x-auto scrollbar-hide pb-2" id="storyList">
            <!-- 动态生成 -->
        </div>
    </div>

    <!-- 动态Feed -->
    <main class="px-4 max-w-2xl mx-auto space-y-4" id="feedList">
        <!-- 动态生成 -->
    </main>

    <!-- 底部导航 -->
    <nav class="glass fixed bottom-0 left-0 right-0 z-50 px-2 py-2">
        <div class="flex justify-around max-w-2xl mx-auto">
            <a href="index.html" class="nav-item active relative flex flex-col items-center gap-1 px-4 py-2">
                <i class="fas fa-home text-lg"></i>
                <span class="text-xs">首页</span>
            </a>
            <a href="ai-tools.html" class="nav-item relative flex flex-col items-center gap-1 px-4 py-2 text-gray-500">
                <i class="fas fa-robot text-lg"></i>
                <span class="text-xs">AI工具</span>
            </a>
            <a href="ai-characters.html" class="nav-item relative flex flex-col items-center gap-1 px-4 py-2 text-gray-500">
                <i class="fas fa-users text-lg"></i>
                <span class="text-xs">角色</span>
            </a>
            <a href="market.html" class="nav-item relative flex flex-col items-center gap-1 px-4 py-2 text-gray-500">
                <i class="fas fa-store text-lg"></i>
                <span class="text-xs">市场</span>
            </a>
            <a href="profile.html" class="nav-item relative flex flex-col items-center gap-1 px-4 py-2 text-gray-500">
                <i class="fas fa-user text-lg"></i>
                <span class="text-xs">我的</span>
            </a>
        </div>
    </nav>

    <!-- 发布按钮 -->
    <button onclick="showPostModal()" class="fixed bottom-24 right-4 w-14 h-14 rounded-full btn-primary flex items-center justify-center shadow-lg z-40">
        <i class="fas fa-plus text-white text-xl"></i>
    </button>

    <!-- 发布弹窗 -->
    <div id="postModal" class="fixed inset-0 z-50 hidden">
        <div class="modal-overlay absolute inset-0" onclick="hidePostModal()"></div>
        <div class="absolute bottom-0 left-0 right-0 bg-[#1a1a24] rounded-t-3xl p-6 max-h-[85vh] overflow-y-auto slide-up">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-semibold">发布动态</h3>
                <button onclick="hidePostModal()" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <textarea id="postContent" class="w-full h-32 p-4 rounded-xl resize-none" placeholder="分享你的想法..."></textarea>
            <div class="flex gap-2 mt-4 overflow-x-auto scrollbar-hide">
                <button class="upload-btn w-20 h-20 rounded-xl border-2 border-dashed border-gray-600 flex flex-col items-center justify-center text-gray-500">
                    <i class="fas fa-image text-xl"></i>
                    <span class="text-xs mt-1">图片</span>
                </button>
                <button class="upload-btn w-20 h-20 rounded-xl border-2 border-dashed border-gray-600 flex flex-col items-center justify-center text-gray-500">
                    <i class="fas fa-music text-xl"></i>
                    <span class="text-xs mt-1">音乐</span>
                </button>
                <button class="upload-btn w-20 h-20 rounded-xl border-2 border-dashed border-gray-600 flex flex-col items-center justify-center text-gray-500">
                    <i class="fas fa-video text-xl"></i>
                    <span class="text-xs mt-1">视频</span>
                </button>
            </div>
            <div class="mt-4">
                <label class="text-sm text-gray-400 mb-2 block">选择分类</label>
                <select id="postCategory" class="w-full p-3 rounded-xl bg-[#12121a] border border-[#2a2a3a]">
                    <option value="ai">AI探索</option>
                    <option value="music">音乐创作</option>
                    <option value="art">艺术设计</option>
                    <option value="tech">科技前沿</option>
                    <option value="life">生活日常</option>
                    <option value="other">其他</option>
                </select>
            </div>
            <button onclick="publishPost()" class="w-full mt-6 py-4 rounded-xl btn-primary text-white font-semibold">
                发布
            </button>
        </div>
    </div>

    <!-- 登录弹窗 -->
    <div id="loginModal" class="fixed inset-0 z-50 hidden">
        <div class="modal-overlay absolute inset-0" onclick="hideLoginModal()"></div>
        <div class="absolute inset-x-4 top-1/2 -translate-y-1/2 bg-[#1a1a24] rounded-2xl p-6 slide-up">
            <h3 class="text-xl font-bold text-center mb-6 gradient-text">欢迎来到碳基圈</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-sm text-gray-400 mb-2 block">选择用户</label>
                    <div class="grid grid-cols-2 gap-3" id="userList">
                        <!-- 动态生成 -->
                    </div>
                </div>
                <div class="flex items-center gap-3 my-4">
                    <div class="flex-1 h-px bg-gray-700"></div>
                    <span class="text-sm text-gray-500">或</span>
                    <div class="flex-1 h-px bg-gray-700"></div>
                </div>
                <button onclick="showCreateUser()" class="w-full py-3 rounded-xl border border-purple-500 text-purple-400 font-semibold">
                    <i class="fas fa-user-plus mr-2"></i>创建新用户
                </button>
            </div>
        </div>
    </div>

    <!-- 评论弹窗 -->
    <div id="commentModal" class="fixed inset-0 z-50 hidden">
        <div class="modal-overlay absolute inset-0" onclick="hideCommentModal()"></div>
        <div class="absolute bottom-0 left-0 right-0 bg-[#1a1a24] rounded-t-3xl p-6 max-h-[70vh] overflow-y-auto slide-up">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-semibold">评论 <span id="commentCount" class="text-gray-400">(0)</span></h3>
                <button onclick="hideCommentModal()" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="commentList" class="space-y-4 mb-4 max-h-64 overflow-y-auto">
                <!-- 动态生成 -->
            </div>
            <div class="flex gap-3 pt-4 border-t border-gray-700">
                <input type="text" id="commentInput" class="flex-1 px-4 py-3 rounded-xl" placeholder="写评论...">
                <button onclick="submitComment()" class="px-6 py-3 rounded-xl btn-primary text-white font-semibold">
                    发送
                </button>
            </div>
        </div>
    </div>

    <script>
        // 数据初始化
        const categories = [
            { id: 'all', name: '全部', icon: '🔥' },
            { id: 'ai', name: 'AI探索', icon: '🤖' },
            { id: 'music', name: '音乐创作', icon: '🎵' },
            { id: 'art', name: '艺术设计', icon: '🎨' },
            { id: 'tech', name: '科技前沿', icon: '🚀' },
            { id: 'life', name: '生活日常', icon: '☀️' },
            { id: 'game', name: '游戏电竞', icon: '🎮' },
            { id: 'movie', name: '影视娱乐', icon: '🎬' },
            { id: 'read', name: '读书笔记', icon: '📚' },
            { id: 'food', name: '美食分享', icon: '🍜' },
            { id: 'travel', name: '旅行见闻', icon: '✈️' },
            { id: 'fitness', name: '健身运动', icon: '💪' },
            { id: 'pet', name: '萌宠天地', icon: '🐱' },
            { id: 'photo', name: '摄影交流', icon: '📷' },
            { id: 'code', name: '编程开发', icon: '💻' },
            { id: 'other', name: '其他', icon: '📌' }
        ];

        const users = [
            { id: 'u1', name: 'AI小探', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Ai', bio: '探索AI的无限可能', followers: 1234, following: 567, posts: 89 },
            { id: 'u2', name: '音乐精灵', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Music', bio: '用音符编织梦想', followers: 2345, following: 123, posts: 156 },
            { id: 'u3', name: '画师小梦', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Art', bio: '每一笔都是艺术', followers: 5678, following: 234, posts: 234 },
            { id: 'u4', name: '科技小王', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Tech', bio: '科技改变生活', followers: 890, following: 456, posts: 67 },
            { id: 'u5', name: '创意达人', avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Create', bio: '创意无限', followers: 3456, following: 789, posts: 123 }
        ];

        const hotSearch = [
            { text: 'ChatGPT-5震撼发布', hot: 98 },
            { text: 'AI生成音乐爆火', hot: 85 },
            { text: 'Sora视频创作大赛', hot: 78 },
            { text: '数字人技术突破', hot: 72 },
            { text: 'Stable Diffusion新版本', hot: 65 }
        ];

        const stories = [
            { id: 's1', user: users[0], hasStory: true, viewed: false },
            { id: 's2', user: users[1], hasStory: true, viewed: false },
            { id: 's3', user: users[2], hasStory: true, viewed: true },
            { id: 's4', user: users[3], hasStory: true, viewed: false },
            { id: 's5', user: users[4], hasStory: true, viewed: false }
        ];

        const samplePosts = [
            {
                id: 'p1',
                user: users[0],
                content: '刚刚用AI生成了一个超酷的封面图！大家觉得怎么样？🎨 #AI创作 #封面设计',
                images: ['https://picsum.photos/400/300?random=1'],
                category: 'ai',
                likes: 234,
                comments: 45,
                collects: 67,
                liked: false,
                collected: false,
                time: '10分钟前'
            },
            {
                id: 'p2',
                user: users[1],
                content: '新歌发布！《星际漫游》🚀 用AI辅助作曲，融合电子与中国风元素，希望大家喜欢！',
                images: ['https://picsum.photos/400/300?random=2'],
                category: 'music',
                likes: 567,
                comments: 89,
                collects: 123,
                liked: false,
                collected: false,
                time: '30分钟前'
            },
            {
                id: 'p3',
                user: users[2],
                content: '分享我最近训练的一个动漫风格模型，可以生成各种二次元角色~ 有兴趣的可以私我交流',
                images: ['https://picsum.photos/400/300?random=3', 'https://picsum.photos/400/300?random=4'],
                category: 'art',
                likes: 890,
                comments: 156,
                collects: 234,
                liked: false,
                collected: false,
                time: '1小时前'
            },
            {
                id: 'p4',
                user: users[3],
                content: '深入体验了最新的大语言模型，总结了10个使用技巧，收藏起来慢慢看！📝',
                images: ['https://picsum.photos/400/300?random=5'],
                category: 'tech',
                likes: 1234,
                comments: 234,
                collects: 456,
                liked: false,
                collected: false,
                time: '2小时前'
            }
        ];

        // 状态管理
        let currentUser = JSON.parse(localStorage.getItem('carbon_circle_user')) || null;
        let currentCategory = 'all';
        let currentPostId = null;

        // 初始化
        function init() {
            initCategories();
            renderHotSearch();
            renderStories();
            renderFeed();
            renderUserList();
            
            if (!currentUser) {
                setTimeout(() => showLoginModal(), 500);
            }
        }

        function initCategories() {
            const container = document.getElementById('categoryList');
            container.innerHTML = categories.map(cat => `
                <button class="category-tag px-4 py-2 rounded-full text-sm whitespace-nowrap ${currentCategory === cat.id ? 'bg-purple-500/20 text-purple-400 border border-purple-500/30' : 'bg-white/5 text-gray-400 border border-transparent'}" 
                        data-category="${cat.id}" onclick="filterCategory('${cat.id}')">
                    ${cat.icon} ${cat.name}
                </button>
            `).join('');
        }

        function renderHotSearch() {
            const container = document.getElementById('hotList');
            container.innerHTML = hotSearch.map((item, index) => `
                <div class="flex-shrink-0 px-4 py-2 rounded-full bg-white/5 text-sm flex items-center gap-2">
                    <span class="${index < 3 ? 'hot-badge text-white px-2 py-0.5 rounded text-xs font-bold' : 'text-gray-500'}">${index + 1}</span>
                    <span class="truncate max-w-[120px]">${item.text}</span>
                    ${item.hot > 80 ? '<i class="fas fa-fire text-orange-500 text-xs"></i>' : ''}
                </div>
            `).join('');
        }

        function renderStories() {
            const container = document.getElementById('storyList');
            container.innerHTML = `
                <div class="flex-shrink-0 flex flex-col items-center gap-2">
                    <div class="w-16 h-16 rounded-full border-2 border-dashed border-purple-500 flex items-center justify-center bg-purple-500/10">
                        <i class="fas fa-plus text-purple-400"></i>
                    </div>
                    <span class="text-xs text-gray-400">发动态</span>
                </div>
                ${stories.map(story => `
                    <div class="flex-shrink-0 flex flex-col items-center gap-2" onclick="viewStory('${story.id}')">
                        <div class="${story.viewed ? 'opacity-60' : 'story-ring'} w-16 h-16 rounded-full p-[2px]">
                            <img src="${story.user.avatar}" class="w-full h-full rounded-full object-cover bg-[#1a1a24]">
                        </div>
                        <span class="text-xs text-gray-400 truncate max-w-[60px]">${story.user.name}</span>
                    </div>
                `).join('')}
            `;
        }

        function renderFeed() {
            const container = document.getElementById('feedList');
            const filteredPosts = currentCategory === 'all' 
                ? samplePosts 
                : samplePosts.filter(p => p.category === currentCategory);
            
            container.innerHTML = filteredPosts.map((post, index) => `
                <article class="card p-4 slide-up" style="animation-delay: ${index * 0.1}s" data-id="${post.id}">
                    <div class="flex items-center gap-3 mb-3">
                        <img src="${post.user.avatar}" class="w-12 h-12 rounded-full object-cover" onclick="goToProfile('${post.user.id}')">
                        <div class="flex-1">
                            <div class="flex items-center gap-2">
                                <span class="font-semibold" onclick="goToProfile('${post.user.id}')">${post.user.name}</span>
                                ${!isFollowing(post.user.id) ? `<button class="px-3 py-1 rounded-full text-xs bg-purple-500/20 text-purple-400" onclick="followUser('${post.user.id}')">+ 关注</button>` : ''}
                            </div>
                            <span class="text-xs text-gray-500">${post.time}</span>
                        </div>
                        <button class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center">
                            <i class="fas fa-ellipsis-h text-gray-500"></i>
                        </button>
                    </div>
                    
                    <p class="mb-3 text-sm leading-relaxed">${post.content}</p>
                    
                    ${post.images && post.images.length > 0 ? `
                        <div class="grid gap-2 mb-3 ${post.images.length > 1 ? 'grid-cols-2' : ''}">
                            ${post.images.map(img => `<img src="${img}" class="rounded-xl w-full object-cover" style="max-height: 300px;">`).join('')}
                        </div>
                    ` : ''}
                    
                    <div class="flex items-center gap-2 mb-3">
                        <span class="badge bg-blue-500/20 text-blue-400">
                            ${categories.find(c => c.id === post.category)?.icon || '📌'} 
                            ${categories.find(c => c.id === post.category)?.name || '其他'}
                        </span>
                    </div>
                    
                    <div class="flex items-center justify-between pt-3 border-t border-gray-800">
                        <button class="flex items-center gap-1 text-gray-400 hover:text-pink-500 transition-colors" onclick="toggleLike('${post.id}')">
                            <i class="${post.liked ? 'fas text-pink-500' : 'far'} fa-heart ${post.liked ? 'like-animation' : ''}"></i>
                            <span class="text-sm">${post.likes}</span>
                        </button>
                        <button class="flex items-center gap-1 text-gray-400 hover:text-blue-500 transition-colors" onclick="showComments('${post.id}')">
                            <i class="far fa-comment"></i>
                            <span class="text-sm">${post.comments}</span>
                        </button>
                        <button class="flex items-center gap-1 text-gray-400 hover:text-yellow-500 transition-colors" onclick="toggleCollect('${post.id}')">
                            <i class="${post.collected ? 'fas text-yellow-500' : 'far'} fa-star ${post.collected ? 'like-animation' : ''}"></i>
                            <span class="text-sm">${post.collects}</span>
                        </button>
                        <button class="flex items-center gap-1 text-gray-400 hover:text-green-500 transition-colors" onclick="sharePost('${post.id}')">
                            <i class="fas fa-share"></i>
                        </button>
                    </div>
                </article>
            `).join('');
        }

        function renderUserList() {
            const container = document.getElementById('userList');
            container.innerHTML = users.map(user => `
                <div class="flex items-center gap-3 p-3 rounded-xl bg-white/5 cursor-pointer hover:bg-white/10 transition-colors" onclick="selectUser('${user.id}')">
                    <img src="${user.avatar}" class="w-12 h-12 rounded-full object-cover">
                    <div>
                        <div class="font-semibold">${user.name}</div>
                        <div class="text-xs text-gray-400">${user.bio}</div>
                    </div>
                </div>
            `).join('');
        }

        // 用户操作
        function selectUser(userId) {
            const user = users.find(u => u.id === userId);
            if (user) {
                localStorage.setItem('carbon_circle_user', JSON.stringify(user));
                currentUser = user;
                hideLoginModal();
                updateUserUI();
            }
        }

        function isFollowing(userId) {
            const following = JSON.parse(localStorage.getItem('carbon_circle_following')) || [];
            return following.includes(userId);
        }

        function followUser(userId) {
            const following = JSON.parse(localStorage.getItem('carbon_circle_following')) || [];
            if (!following.includes(userId)) {
                following.push(userId);
                localStorage.setItem('carbon_circle_following', JSON.stringify(following));
                renderFeed();
            }
        }

        // 动态操作
        function toggleLike(postId) {
            const post = samplePosts.find(p => p.id === postId);
            if (post) {
                post.liked = !post.liked;
                post.likes += post.liked ? 1 : -1;
                renderFeed();
            }
        }

        function toggleCollect(postId) {
            const post = samplePosts.find(p => p.id === postId);
            if (post) {
                post.collected = !post.collected;
                post.collects += post.collected ? 1 : -1;
                renderFeed();
            }
        }

        function showComments(postId) {
            currentPostId = postId;
            const post = samplePosts.find(p => p.id === postId);
            if (post) {
                document.getElementById('commentCount').textContent = `(${post.comments})`;
                document.getElementById('commentList').innerHTML = `
                    <div class="flex gap-3">
                        <img src="${currentUser?.avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=Default'}" class="w-10 h-10 rounded-full object-cover flex-shrink-0">
                        <div>
                            <div class="text-sm"><span class="font-semibold">${currentUser?.name || '游客'}</span></div>
                            <p class="text-sm text-gray-400 mt-1">AI生成的内容真棒！</p>
                            <div class="text-xs text-gray-500 mt-1">刚刚</div>
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <img src="${post.user.avatar}" class="w-10 h-10 rounded-full object-cover flex-shrink-0">
                        <div>
                            <div class="text-sm"><span class="font-semibold">${post.user.name}</span></div>
                            <p class="text-sm text-gray-400 mt-1">谢谢支持！</p>
                            <div class="text-xs text-gray-500 mt-1">5分钟前</div>
                        </div>
                    </div>
                `;
                document.getElementById('commentModal').classList.remove('hidden');
            }
        }

        function submitComment() {
            const input = document.getElementById('commentInput');
            const text = input.value.trim();
            if (text) {
                const post = samplePosts.find(p => p.id === currentPostId);
                if (post) {
                    post.comments++;
                    input.value = '';
                    showComments(currentPostId);
                }
            }
        }

        function sharePost(postId) {
            alert('分享链接已复制到剪贴板！');
        }

        // 分类筛选
        function filterCategory(categoryId) {
            currentCategory = categoryId;
            initCategories();
            renderFeed();
        }

        // 弹窗控制
        function showLoginModal() {
            document.getElementById('loginModal').classList.remove('hidden');
        }

        function hideLoginModal() {
            document.getElementById('loginModal').classList.add('hidden');
        }

        function showPostModal() {
            if (!currentUser) {
                showLoginModal();
                return;
            }
            document.getElementById('postModal').classList.remove('hidden');
        }

        function hidePostModal() {
            document.getElementById('postModal').classList.add('hidden');
        }

        function hideCommentModal() {
            document.getElementById('commentModal').classList.add('hidden');
        }

        function showSearch() {
            alert('搜索功能开发中...');
        }

        function toggleNotifications() {
            alert('暂无新通知');
        }

        function showCreateUser() {
            const name = prompt('请输入用户名:');
            if (name) {
                const newUser = {
                    id: 'u' + Date.now(),
                    name: name,
                    avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${name}`,
                    bio: '新用户',
                    followers: 0,
                    following: 0,
                    posts: 0
                };
                users.push(newUser);
                selectUser(newUser.id);
                renderUserList();
            }
        }

        function publishPost() {
            const content = document.getElementById('postContent').value.trim();
            const category = document.getElementById('postCategory').value;
            
            if (!content) {
                alert('请输入内容');
                return;
            }
            
            const newPost = {
                id: 'p' + Date.now(),
                user: currentUser,
                content: content,
                images: [],
                category: category,
                likes: 0,
                comments: 0,
                collects: 0,
                liked: false,
                collected: false,
                time: '刚刚'
            };
            
            samplePosts.unshift(newPost);
            hidePostModal();
            document.getElementById('postContent').value = '';
            renderFeed();
            alert('发布成功！');
        }

        function viewStory(storyId) {
            alert('故事浏览功能开发中...');
        }

        function goToProfile(userId) {
            window.location.href = `profile.html?user=${userId}`;
        }

        function updateUserUI() {
            // 更新用户界面元素
        }

        // 启动
        init();
    </script>
</body>
</html>
